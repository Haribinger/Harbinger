# Harbinger Nginx Reverse Proxy — Production Configuration

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/vnd.ms-fontobject application/x-font-ttf
               font/opentype image/svg+xml image/x-icon;

    # File size limits — 10M default, override per-location where needed
    client_max_body_size 10M;

    # Docker embedded DNS — required when using variables in proxy_pass (lazy upstream resolution)
    resolver 127.0.0.11 valid=10s;

    # ---- Rate limiting zones ----
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=mcp_tools:10m rate=10r/s;

    # Upstream definitions
    upstream frontend {
        server frontend:8080;
        keepalive 32;
    }

    upstream backend {
        server backend:8080;
        keepalive 32;
    }

    upstream hexstrike {
        server hexstrike:3001;
        keepalive 16;
    }

    upstream mcp_ui {
        server mcp-ui:3003;
        keepalive 16;
    }

    # redteam upstream omitted: resolved at request time via variable (container may not exist when nginx starts)

    # ---- HTTP → HTTPS redirect (enable when SSL certs are in docker/nginx/ssl/) ----
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }

    # ---- Main server block ----
    server {
        listen 80;
        # Enable TLS: place cert.pem and key.pem in docker/nginx/ssl/, then uncomment:
        # listen 443 ssl http2;
        # ssl_certificate /etc/nginx/ssl/cert.pem;
        # ssl_certificate_key /etc/nginx/ssl/key.pem;
        # ssl_protocols TLSv1.2 TLSv1.3;
        # ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        # ssl_prefer_server_ciphers off;
        # ssl_session_cache shared:SSL:10m;
        # ssl_session_timeout 1d;
        # ssl_session_tickets off;
        server_name _;

        # ---- Security headers ----
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' wss: ws:; frame-ancestors 'self';" always;
        # Enable HSTS after confirming TLS works (uncomment with TLS):
        # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ---- Health check (direct to backend) ----
        location = /health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ---- Auth endpoints (strict rate limit) ----
        location /api/auth/ {
            limit_req zone=api_auth burst=10 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        # ---- Backend API ----
        location /api/ {
            limit_req zone=api_general burst=50 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ---- WebSocket ----
        location /ws {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
        }

        # ---- HexStrike MCP ----
        location /mcp/hexstrike/ {
            limit_req zone=mcp_tools burst=20 nodelay;
            rewrite ^/mcp/hexstrike/(.*) /$1 break;
            proxy_pass http://hexstrike;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 30s;
            proxy_read_timeout 600s;
            client_max_body_size 50M;
        }

        # ---- MCP-UI ----
        location /mcp/ui/ {
            rewrite ^/mcp/ui/(.*) /$1 break;
            proxy_pass http://mcp_ui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # SSE support
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_cache off;
        }

        # ---- Red Team Operations (variable so redteam can start after nginx) ----
        location /api/redteam/ {
            set $redteam_upstream redteam:3004;
            limit_req zone=mcp_tools burst=20 nodelay;
            rewrite ^/api/redteam/(.*) /api/$1 break;
            proxy_pass http://$redteam_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 30s;
            proxy_read_timeout 600s;

            # SSE support for streaming
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_cache off;
        }

        # ---- Static brand assets ----
        location /brand/ {
            root /usr/share/nginx/html;
            expires 7d;
            add_header Cache-Control "public";
        }

        # ---- Frontend (SPA) ----
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # SPA fallback handled by frontend nginx
            proxy_intercept_errors off;
        }
    }
}
