version: '3.8'
services:
  n8n:
    image: n8nio/n8n:latest
    container_name: harbinger-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-harbinger}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASS:-changeme}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/home/node/workflows
    networks:
      - harbinger-net

volumes:
  n8n_data:

networks:
  harbinger-net:
    external: true
