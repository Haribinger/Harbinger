# ─────────────────────────────────────────────────────────────────────────────
#  HARBINGER DEPENDABOT CONFIGURATION
#  Automated dependency updates for npm, Go, Docker, and GitHub Actions.
#  Runs weekly; groups minor/patch updates to reduce PR noise.
# ─────────────────────────────────────────────────────────────────────────────

version: 2

registries: {}

updates:
  # ─── npm (pnpm) — Frontend SPA ────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/harbinger-tools/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "Haribinger"
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps):"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
      react-ecosystem:
        patterns:
          - "react*"
          - "@types/react*"
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Avoid major version bumps without manual review
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ─── npm (pnpm) — Root workspace ──────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps):"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # ─── Go modules — Backend API ─────────────────────────────────────────────
  - package-ecosystem: "gomod"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "04:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "Haribinger"
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "chore(deps):"
    groups:
      go-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ─── Docker — Compose services ────────────────────────────────────────────
  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "04:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(deps):"

  # ─── GitHub Actions — Workflow dependencies ────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "04:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci):"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
