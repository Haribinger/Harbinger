name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: harbinger-tools/frontend

      - name: Type check
        run: pnpm tsc --noEmit
        working-directory: harbinger-tools/frontend

      - name: Build
        run: pnpm build
        working-directory: harbinger-tools/frontend

  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        run: go build -o /tmp/harbinger-backend ./cmd/
        working-directory: backend

      - name: Vet
        run: go vet ./cmd/...
        working-directory: backend
