# ─────────────────────────────────────────────────────────────────────────────
#  HARBINGER CI
#  Frontend (React 19 + Vite 6 + TypeScript) and Backend (Go 1.24)
#
#  Triggers:  push to main, pull requests, manual dispatch
#  Features:  concurrency cancel, env-driven versions, build artifact,
#             pnpm/Go caches, markdown job summary
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  GO_VERSION: '1.24'
  PNPM_VERSION: '10'

permissions:
  contents: read

jobs:
  # ─── Frontend ───────────────────────────────────────────────────────────────
  build-frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm ${{ env.PNPM_VERSION }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: harbinger-tools/frontend
        run: pnpm exec tsc --noEmit

      - name: Lint
        working-directory: harbinger-tools/frontend
        run: |
          # Count warnings but don't fail on pre-existing debt.
          # Fail only on ESLint errors (exit code 2) or new rule violations.
          pnpm exec eslint . 2>&1 | tee /tmp/eslint-output.txt
          EXIT_CODE=${PIPESTATUS[0]}

          WARN_COUNT=$(grep -c "warning" /tmp/eslint-output.txt || echo 0)
          ERROR_COUNT=$(grep -c "error" /tmp/eslint-output.txt || echo 0)

          echo "ESLint: $ERROR_COUNT errors, $WARN_COUNT warnings"
          echo "lint_warnings=$WARN_COUNT" >> $GITHUB_OUTPUT
          echo "lint_errors=$ERROR_COUNT" >> $GITHUB_OUTPUT

          # ESLint exit code 1 = warnings only, 2 = errors
          if [ "$EXIT_CODE" -ge 2 ]; then
            echo "::error::ESLint found fatal errors"
            exit 1
          fi

      - name: Build
        run: pnpm build:ui

      - name: Test
        run: pnpm --filter harbinger-frontend test --run --passWithNoTests

      - name: Upload build artifact
        if: success() && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: harbinger-tools/frontend/dist
          retention-days: 7

  # ─── Backend ────────────────────────────────────────────────────────────────
  build-backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Build
        run: go build -o /tmp/harbinger-backend ./cmd/
        working-directory: backend

      - name: Vet
        run: go vet ./cmd/...
        working-directory: backend

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Vulnerability check
        working-directory: backend
        run: |
          govulncheck ./... 2>&1 || {
            echo "::warning::govulncheck found known vulnerabilities"
          }

      - name: Test
        run: go test ./cmd/... -count=1 -timeout 120s
        working-directory: backend

  # ─── Security Scan ─────────────────────────────────────────────────────────
  security-scan:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for leaked secrets
        run: |
          ISSUES=0

          # AWS access keys
          if grep -rn 'AKIA[0-9A-Z]\{16\}' --include='*.ts' --include='*.tsx' --include='*.go' --include='*.js' --exclude-dir=node_modules --exclude-dir=dist . 2>/dev/null; then
            echo "::error::Possible AWS access key found in source"
            ISSUES=$((ISSUES + 1))
          fi

          # OpenAI / Anthropic API keys
          if grep -rn 'sk-[a-zA-Z0-9]\{20,\}' --include='*.ts' --include='*.tsx' --include='*.go' --include='*.js' --exclude-dir=node_modules --exclude-dir=dist . 2>/dev/null; then
            echo "::error::Possible API secret key found in source"
            ISSUES=$((ISSUES + 1))
          fi

          # GitHub tokens
          if grep -rn 'ghp_[a-zA-Z0-9]\{36\}\|gho_[a-zA-Z0-9]\{36\}\|github_pat_[a-zA-Z0-9]\{22\}_[a-zA-Z0-9]\{59\}' \
            --include='*.ts' --include='*.tsx' --include='*.go' --include='*.js' \
            --exclude-dir=node_modules --exclude-dir=dist . 2>/dev/null; then
            echo "::error::GitHub token found in source"
            ISSUES=$((ISSUES + 1))
          fi

          # Generic high-entropy secrets (base64 strings > 40 chars in assignments)
          if grep -rn 'SECRET\|TOKEN\|APIKEY\|API_KEY' --include='*.ts' --include='*.tsx' --include='*.go' --include='*.js' \
            --exclude-dir=node_modules --exclude-dir=dist . 2>/dev/null | \
            grep -E '["'"'"'][A-Za-z0-9+/=]{40,}["'"'"']' | \
            grep -v 'process\.env\|os\.Getenv\|import\|placeholder\|example\|test\|mock\|TODO' 2>/dev/null; then
            echo "::warning::Possible high-entropy secret in source"
            ISSUES=$((ISSUES + 1))
          fi

          # Private keys
          if grep -rn 'BEGIN RSA PRIVATE KEY\|BEGIN EC PRIVATE KEY\|BEGIN PRIVATE KEY' \
            --include='*.ts' --include='*.tsx' --include='*.go' --include='*.js' \
            --exclude-dir=node_modules --exclude-dir=dist . 2>/dev/null; then
            echo "::error::Private key found in source code"
            ISSUES=$((ISSUES + 1))
          fi

          # Hardcoded passwords
          if grep -rn 'password\s*[:=]\s*["'"'"'][^"'"'"']\{8,\}["'"'"']' --include='*.ts' --include='*.tsx' --include='*.go' --exclude-dir=node_modules --exclude-dir=dist . 2>/dev/null | grep -v 'placeholder\|example\|test\|TODO\|FIXME\|mock' ; then
            echo "::warning::Possible hardcoded password found"
            ISSUES=$((ISSUES + 1))
          fi

          if [ "$ISSUES" -gt 0 ]; then
            echo "::error::Found $ISSUES potential secret leaks. Review before merging."
            exit 1
          fi

          echo "No leaked secrets detected"

      - name: Check for .env files in commit
        run: |
          if git ls-files --cached | grep -E '\.env$|\.env\.local$|\.env\.production$|\.env\.development$'; then
            echo "::error::.env file committed to repository"
            exit 1
          fi
          echo "No .env files in tracked files"

      - name: Check for dangerous patterns
        run: |
          WARNS=0

          # eval() usage in frontend
          if grep -rn '\beval(' --include='*.ts' --include='*.tsx' --include='*.js' \
            --exclude-dir=node_modules --exclude-dir=dist . 2>/dev/null; then
            echo "::warning::eval() usage detected — potential code injection risk"
            WARNS=$((WARNS + 1))
          fi

          # Disabled TLS verification
          if grep -rn 'InsecureSkipVerify:\s*true' --include='*.go' --exclude-dir=vendor . 2>/dev/null; then
            echo "::error::InsecureSkipVerify=true — TLS verification disabled"
            exit 1
          fi

          if [ "$WARNS" -gt 0 ]; then
            echo "::warning::Found $WARNS security warnings (non-blocking)"
          fi

  # ─── MockHunter ───────────────────────────────────────────────────────────
  mockhunter:
    name: MockHunter
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build MockHunter
        run: go build -o /tmp/mockhunter .
        working-directory: tools/mockhunter

      - name: Scan codebase
        run: |
          /tmp/mockhunter scan --dir . \
            --min-severity high \
            --min-confidence 0.7 \
            --exclude-tests \
            --format text 2>&1 | tee /tmp/mockhunter-output.txt

          /tmp/mockhunter scan --dir . \
            --min-severity high \
            --min-confidence 0.7 \
            --exclude-tests \
            --format sarif > /tmp/mockhunter.sarif 2>/dev/null || true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: /tmp/mockhunter.sarif
        continue-on-error: true

  # ─── Summary ────────────────────────────────────────────────────────────────
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend, security-scan, mockhunter]
    if: always() && !cancelled()
    steps:
      - name: Evaluate results and write summary
        env:
          FE_RESULT: ${{ needs.build-frontend.result }}
          BE_RESULT: ${{ needs.build-backend.result }}
          SEC_RESULT: ${{ needs.security-scan.result }}
          MH_RESULT: ${{ needs.mockhunter.result }}
        run: |
          FE_ICON=$( [ "$FE_RESULT" = "success" ] && echo "pass" || echo "FAIL" )
          BE_ICON=$( [ "$BE_RESULT" = "success" ] && echo "pass" || echo "FAIL" )
          SEC_ICON=$( [ "$SEC_RESULT" = "success" ] && echo "pass" || echo "FAIL" )
          MH_ICON=$( [ "$MH_RESULT" = "success" ] && echo "pass" || echo "FAIL" )

          ALL_PASS="false"
          if [ "$FE_RESULT" = "success" ] && [ "$BE_RESULT" = "success" ] && [ "$SEC_RESULT" = "success" ]; then
            ALL_PASS="true"
          fi

          if [ "$ALL_PASS" = "true" ]; then
            TITLE="CI passed"
          else
            TITLE="CI failed"
          fi

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## $TITLE

          | Job | Status | Steps |
          |-----|--------|-------|
          | **Frontend** | $FE_ICON | install, typecheck, lint, build, test |
          | **Backend** | $BE_ICON | build, vet, test |
          | **Security** | $SEC_ICON | secrets scan, env check |
          | **MockHunter** | $MH_ICON | build, scan (high sev, 0.7+ conf) |

          **Commit:** \`${GITHUB_SHA::8}\` on \`${GITHUB_REF_NAME}\`
          **Run:** [#${GITHUB_RUN_NUMBER}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})
          EOF

          if [ "$ALL_PASS" = "false" ]; then
            echo "::error::One or more CI jobs failed. Fix the failing job(s) and push again."
            exit 1
          fi
