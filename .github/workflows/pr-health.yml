# ─────────────────────────────────────────────────────────────────────────────
#  HARBINGER PR HEALTH CHECK
#  MAINTAINER agent scans code health on every PR, posts a score comment,
#  and applies health labels. Fails on critical scores (< 30).
#
#  Docs: docs/github-actions/README.md
# ─────────────────────────────────────────────────────────────────────────────

name: PR Health Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted]

concurrency:
  group: pr-health-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  health-check:
    name: Health Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm ${{ env.PNPM_VERSION }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Run health scans
        id: scan
        run: |
          chmod +x skills/claude-skills/maintainer/scripts/run-maintenance.sh
          REPORT=$(bash skills/claude-skills/maintainer/scripts/run-maintenance.sh)
          echo "$REPORT" > health-report.json
          echo "report<<EOF" >> $GITHUB_OUTPUT
          echo "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Extract score for threshold check (default to 0 if extraction fails)
          SCORE=$(echo "$REPORT" | grep -o '"score": [0-9]*' | head -1 | grep -o '[0-9]*$' || echo 0)
          SCORE=${SCORE:-0}
          echo "score=$SCORE" >> $GITHUB_OUTPUT

          # Extract individual metrics
          ANY_TYPES=$(echo "$REPORT" | grep -o '"any_types": [0-9]*' | head -1 | grep -o '[0-9]*$')
          CONSOLE_LOGS=$(echo "$REPORT" | grep -o '"console_logs": [0-9]*' | head -1 | grep -o '[0-9]*$')
          echo "any_types=$ANY_TYPES" >> $GITHUB_OUTPUT
          echo "console_logs=$CONSOLE_LOGS" >> $GITHUB_OUTPUT

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const score = parseInt('${{ steps.scan.outputs.score }}') || 0;
            const anyTypes = parseInt('${{ steps.scan.outputs.any_types }}') || 0;
            const consoleLogs = parseInt('${{ steps.scan.outputs.console_logs }}') || 0;

            const scoreEmoji = score >= 80 ? '🟢' : score >= 60 ? '🟡' : '🔴';
            const statusBadge = score >= 80 ? 'HEALTHY' : score >= 60 ? 'NEEDS WORK' : 'CRITICAL';

            const body = `## Code Health Report ${scoreEmoji}

            **Score: ${score}/100** — ${statusBadge}

            | Metric | Count | Severity |
            |--------|-------|----------|
            | \`any\` types | ${anyTypes} | ${anyTypes > 20 ? '🔴 Critical' : anyTypes > 5 ? '🟡 Medium' : '🟢 Good'} |
            | \`console.log\` | ${consoleLogs} | ${consoleLogs > 10 ? '🟡 Medium' : '🟢 Good'} |

            <details>
            <summary>Raw scan data</summary>

            \`\`\`json
            ${{ steps.scan.outputs.report }}
            \`\`\`
            </details>

            ---
            *Generated by MAINTAINER agent*`;

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('Code Health Report'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Apply labels
        uses: actions/github-script@v7
        with:
          script: |
            const score = parseInt('${{ steps.scan.outputs.score }}') || 0;
            const labels = [];
            if (score < 50) labels.push('health:critical');
            else if (score < 80) labels.push('health:needs-work');
            else labels.push('health:good');

            // Remove old health labels first
            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const label of currentLabels) {
              if (label.name.startsWith('health:')) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: label.name,
                }).catch(() => {});
              }
            }

            // Ensure labels exist
            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label });
              } catch {
                const colors = { 'health:critical': 'ef4444', 'health:needs-work': 'f59e0b', 'health:good': '22c55e' };
                await github.rest.issues.createLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  name: label, color: colors[label] || '666666',
                });
              }
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels,
            });

      - name: Fail on critical score
        if: steps.scan.outputs.score < 30
        run: |
          echo "::error::Health score ${{ steps.scan.outputs.score }}/100 is below critical threshold (30)"
          exit 1
