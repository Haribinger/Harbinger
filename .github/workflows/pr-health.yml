# ─────────────────────────────────────────────────────────────────────────────
#  HARBINGER PR HEALTH CHECK
#  MAINTAINER agent scans code health on every PR, posts a score comment,
#  and applies health labels. Fails on critical scores (< 30).
# ─────────────────────────────────────────────────────────────────────────────

name: PR Health Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-health-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  health-check:
    name: Health Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm ${{ env.PNPM_VERSION }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install ripgrep
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep

      - name: Run health scans
        id: scan
        run: |
          chmod +x skills/claude-skills/maintainer/scripts/run-maintenance.sh

          # Capture only stdout (the JSON). Debug/trace goes to stderr.
          REPORT=$(bash skills/claude-skills/maintainer/scripts/run-maintenance.sh 2>/dev/null)

          # Validate we got JSON
          if ! echo "$REPORT" | head -1 | grep -q '^{'; then
            echo "::warning::Maintenance script did not produce valid JSON, using defaults"
            REPORT='{"date":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'","score":50,"metrics":{"any_types":0,"console_logs":0,"empty_catches":0,"todo_count":0,"hardcoded_urls":0,"deps_outdated":0,"test_coverage":0,"conventions":0,"go_vet_issues":0},"deductions":0,"bonus":0}'
          fi

          echo "$REPORT" > health-report.json
          echo "report<<GHEOF" >> $GITHUB_OUTPUT
          echo "$REPORT" >> $GITHUB_OUTPUT
          echo "GHEOF" >> $GITHUB_OUTPUT

          # Extract score
          SCORE=$(echo "$REPORT" | grep -o '"score": *[0-9]*' | head -1 | grep -o '[0-9]*$' || echo 50)
          SCORE=${SCORE:-50}
          echo "score=$SCORE" >> $GITHUB_OUTPUT

          # Extract metrics from nested structure
          ANY_TYPES=$(echo "$REPORT" | grep -o '"any_types": *[0-9]*' | head -1 | grep -o '[0-9]*$' || echo 0)
          CONSOLE_LOGS=$(echo "$REPORT" | grep -o '"console_logs": *[0-9]*' | head -1 | grep -o '[0-9]*$' || echo 0)
          EMPTY_CATCHES=$(echo "$REPORT" | grep -o '"empty_catches": *[0-9]*' | head -1 | grep -o '[0-9]*$' || echo 0)
          TODO_COUNT=$(echo "$REPORT" | grep -o '"todo_count": *[0-9]*' | head -1 | grep -o '[0-9]*$' || echo 0)
          HARDCODED_URLS=$(echo "$REPORT" | grep -o '"hardcoded_urls": *[0-9]*' | head -1 | grep -o '[0-9]*$' || echo 0)

          echo "any_types=${ANY_TYPES:-0}" >> $GITHUB_OUTPUT
          echo "console_logs=${CONSOLE_LOGS:-0}" >> $GITHUB_OUTPUT
          echo "empty_catches=${EMPTY_CATCHES:-0}" >> $GITHUB_OUTPUT
          echo "todo_count=${TODO_COUNT:-0}" >> $GITHUB_OUTPUT
          echo "hardcoded_urls=${HARDCODED_URLS:-0}" >> $GITHUB_OUTPUT

      - name: Post PR comment
        uses: actions/github-script@v8
        with:
          script: |
            const score = parseInt('${{ steps.scan.outputs.score }}') || 0;
            const anyTypes = parseInt('${{ steps.scan.outputs.any_types }}') || 0;
            const consoleLogs = parseInt('${{ steps.scan.outputs.console_logs }}') || 0;
            const emptyCatches = parseInt('${{ steps.scan.outputs.empty_catches }}') || 0;
            const todoCount = parseInt('${{ steps.scan.outputs.todo_count }}') || 0;
            const hardcodedUrls = parseInt('${{ steps.scan.outputs.hardcoded_urls }}') || 0;

            const scoreBar = (s) => {
              const filled = Math.round(s / 5);
              return '█'.repeat(filled) + '░'.repeat(20 - filled);
            };

            const severity = (val, low, mid) => val > mid ? 'CRITICAL' : val > low ? 'MEDIUM' : 'GOOD';
            const severityIcon = (val, low, mid) => val > mid ? '🔴' : val > low ? '🟡' : '🟢';

            const statusBadge = score >= 80 ? 'HEALTHY' : score >= 60 ? 'NEEDS WORK' : score >= 30 ? 'WARNING' : 'CRITICAL';
            const statusIcon = score >= 80 ? '🟢' : score >= 60 ? '🟡' : score >= 30 ? '🟠' : '🔴';

            const body = `## ${statusIcon} Code Health Report

            **Score: ${score}/100** — ${statusBadge}
            \`${scoreBar(score)}\` ${score}%

            | Metric | Count | Severity |
            |--------|-------|----------|
            | \`any\` types | ${anyTypes} | ${severityIcon(anyTypes, 20, 100)} ${severity(anyTypes, 20, 100)} |
            | \`console.log\` | ${consoleLogs} | ${severityIcon(consoleLogs, 5, 20)} ${severity(consoleLogs, 5, 20)} |
            | Empty \`catch\` blocks | ${emptyCatches} | ${severityIcon(emptyCatches, 2, 10)} ${severity(emptyCatches, 2, 10)} |
            | TODO/FIXME markers | ${todoCount} | ${severityIcon(todoCount, 20, 50)} ${severity(todoCount, 20, 50)} |
            | Hardcoded URLs | ${hardcodedUrls} | ${severityIcon(hardcodedUrls, 3, 10)} ${severity(hardcodedUrls, 3, 10)} |

            <details>
            <summary>Full scan report</summary>

            \`\`\`json
            ${{ steps.scan.outputs.report }}
            \`\`\`
            </details>

            <details>
            <summary>How scoring works</summary>

            Starting from 100, deductions are applied (capped per category, max 10-15 each):
            - \`any\` types: -0.5 each (max 15)
            - \`console.log\`: -1 each (max 15)
            - Empty catches: -3 each (max 15)
            - TODOs: -0.2 each (max 10)
            - Hardcoded URLs: -2 each (max 15)
            - Outdated deps: -0.33 each (max 10)
            - Convention violations: -0.2 each (max 10)
            - Go vet issues: -3 each (max 15)
            - Test coverage bonus: +coverage% * 0.3
            </details>

            ---
            *Generated by MAINTAINER agent — [view workflow](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})*`;

            // Find existing comment to update (avoids spam)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes('Code Health Report'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Apply labels
        uses: actions/github-script@v8
        with:
          script: |
            const score = parseInt('${{ steps.scan.outputs.score }}') || 0;
            const labels = [];
            if (score < 30) labels.push('health:critical');
            else if (score < 60) labels.push('health:needs-work');
            else if (score < 80) labels.push('health:fair');
            else labels.push('health:good');

            // Remove old health labels first
            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const label of currentLabels) {
              if (label.name.startsWith('health:')) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: label.name,
                }).catch(() => {});
              }
            }

            // Ensure labels exist with correct colors
            const colors = {
              'health:critical': 'ef4444',
              'health:needs-work': 'f59e0b',
              'health:fair': '3b82f6',
              'health:good': '22c55e',
            };
            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                });
              } catch {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: colors[label] || '666666',
                });
              }
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels,
            });

      - name: Fail on critical score
        run: |
          SCORE="${{ steps.scan.outputs.score }}"
          SCORE=${SCORE:-0}
          if [ "$SCORE" -lt 30 ] 2>/dev/null; then
            echo "::error::Health score $SCORE/100 is below critical threshold (30)"
            exit 1
          fi

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-report
          path: health-report.json
          retention-days: 30
