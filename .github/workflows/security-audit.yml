# ─────────────────────────────────────────────────────────────────────────────
#  HARBINGER SECURITY AUDIT
#  Weekly comprehensive security scan: npm audit, govulncheck, SAST patterns.
#  Also runs on-demand via workflow_dispatch.
# ─────────────────────────────────────────────────────────────────────────────

name: Security Audit

on:
  schedule:
    - cron: '0 5 * * 1'   # Monday 05:00 UTC
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  NODE_VERSION: '20'
  GO_VERSION: '1.24'
  PNPM_VERSION: '10'

jobs:
  # ─── npm audit ─────────────────────────────────────────────────────────────
  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm ${{ env.PNPM_VERSION }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: |
          echo "## npm Dependency Audit" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # pnpm audit exits non-zero on findings — capture output
          AUDIT_OUTPUT=$(pnpm audit --prod 2>&1) || true
          AUDIT_EXIT=$?

          echo "$AUDIT_OUTPUT"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$AUDIT_OUTPUT" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          # Fail on high/critical only
          if echo "$AUDIT_OUTPUT" | grep -qiE 'critical|high'; then
            echo "::error::npm audit found high/critical vulnerabilities"
            exit 1
          fi

  # ─── Go vulnerability check ────────────────────────────────────────────────
  go-vulncheck:
    name: Go Vulncheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        working-directory: backend
        run: |
          echo "## Go Vulnerability Check" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          VULN_OUTPUT=$(govulncheck ./... 2>&1) || true
          VULN_EXIT=$?

          echo "$VULN_OUTPUT"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$VULN_OUTPUT" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          if [ "$VULN_EXIT" -ne 0 ]; then
            echo "::warning::govulncheck found known vulnerabilities in Go dependencies"
          fi

  # ─── SAST pattern scan ─────────────────────────────────────────────────────
  sast-patterns:
    name: SAST Patterns
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan for dangerous patterns
        run: |
          ISSUES=0

          echo "## SAST Pattern Scan" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # SQL injection patterns (raw string interpolation in SQL)
          if grep -rn 'fmt\.Sprintf.*SELECT\|fmt\.Sprintf.*INSERT\|fmt\.Sprintf.*UPDATE\|fmt\.Sprintf.*DELETE' \
            --include='*.go' --exclude-dir=vendor --exclude-dir=test . 2>/dev/null; then
            echo "::warning::Possible SQL injection — use parameterized queries"
            echo "- :warning: Possible SQL injection patterns found" >> "$GITHUB_STEP_SUMMARY"
            ISSUES=$((ISSUES + 1))
          fi

          # Command injection patterns
          if grep -rn 'exec\.Command.*fmt\.Sprintf\|exec\.Command.*\+' \
            --include='*.go' --exclude-dir=vendor --exclude-dir=test . 2>/dev/null; then
            echo "::warning::Possible command injection — validate inputs"
            echo "- :warning: Possible command injection patterns found" >> "$GITHUB_STEP_SUMMARY"
            ISSUES=$((ISSUES + 1))
          fi

          # XSS patterns (dangerouslySetInnerHTML with dynamic data)
          if grep -rn 'dangerouslySetInnerHTML' \
            --include='*.tsx' --include='*.jsx' --exclude-dir=node_modules --exclude-dir=dist . 2>/dev/null; then
            echo "::warning::dangerouslySetInnerHTML usage detected — verify input sanitization"
            echo "- :warning: dangerouslySetInnerHTML usage found" >> "$GITHUB_STEP_SUMMARY"
            ISSUES=$((ISSUES + 1))
          fi

          # Hardcoded JWT secrets
          if grep -rn 'jwt\.Sign\|jwt\.NewWithClaims' --include='*.go' --exclude-dir=vendor . 2>/dev/null | \
            grep -i 'secret\|"key"\|hardcoded' 2>/dev/null; then
            echo "::warning::Possible hardcoded JWT secret"
            echo "- :warning: Possible hardcoded JWT secret" >> "$GITHUB_STEP_SUMMARY"
            ISSUES=$((ISSUES + 1))
          fi

          # Insecure TLS
          if grep -rn 'InsecureSkipVerify:\s*true' --include='*.go' --exclude-dir=vendor . 2>/dev/null; then
            echo "::warning::InsecureSkipVerify=true disables TLS verification"
            echo "- :warning: InsecureSkipVerify=true found" >> "$GITHUB_STEP_SUMMARY"
            ISSUES=$((ISSUES + 1))
          fi

          # Exposed debug endpoints
          if grep -rn '/debug/pprof\|/debug/vars' --include='*.go' --exclude-dir=vendor . 2>/dev/null; then
            echo "::warning::Debug endpoints exposed — ensure they are behind auth"
            echo "- :warning: Debug endpoints detected" >> "$GITHUB_STEP_SUMMARY"
            ISSUES=$((ISSUES + 1))
          fi

          # Weak crypto
          if grep -rn 'crypto/md5\|crypto/sha1\|crypto/des\|crypto/rc4' \
            --include='*.go' --exclude-dir=vendor . 2>/dev/null; then
            echo "::warning::Weak cryptographic algorithm usage"
            echo "- :warning: Weak crypto algorithm found" >> "$GITHUB_STEP_SUMMARY"
            ISSUES=$((ISSUES + 1))
          fi

          # Unsafe eval in frontend
          if grep -rn '\beval(' --include='*.ts' --include='*.tsx' --include='*.js' \
            --exclude-dir=node_modules --exclude-dir=dist . 2>/dev/null; then
            echo "::warning::eval() usage detected — potential code injection"
            echo "- :warning: eval() usage found" >> "$GITHUB_STEP_SUMMARY"
            ISSUES=$((ISSUES + 1))
          fi

          # Hardcoded private keys
          if grep -rn 'BEGIN RSA PRIVATE KEY\|BEGIN EC PRIVATE KEY\|BEGIN PRIVATE KEY' \
            --include='*.go' --include='*.ts' --include='*.tsx' --include='*.js' \
            --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=vendor . 2>/dev/null; then
            echo "::error::Private key found in source code"
            echo "- :rotating_light: Private key in source code" >> "$GITHUB_STEP_SUMMARY"
            ISSUES=$((ISSUES + 1))
          fi

          if [ "$ISSUES" -eq 0 ]; then
            echo "- :white_check_mark: No dangerous patterns detected" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Issues found:** $ISSUES" >> "$GITHUB_STEP_SUMMARY"

          # Private keys are a hard fail; everything else is a warning
          if grep -rn 'BEGIN RSA PRIVATE KEY\|BEGIN EC PRIVATE KEY\|BEGIN PRIVATE KEY' \
            --include='*.go' --include='*.ts' --include='*.tsx' --include='*.js' \
            --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=vendor . 2>/dev/null; then
            exit 1
          fi

  # ─── Summary ───────────────────────────────────────────────────────────────
  audit-summary:
    name: Audit Summary
    runs-on: ubuntu-latest
    needs: [npm-audit, go-vulncheck, sast-patterns]
    if: always() && !cancelled()
    steps:
      - name: Evaluate results
        env:
          NPM_RESULT: ${{ needs.npm-audit.result }}
          GO_RESULT: ${{ needs.go-vulncheck.result }}
          SAST_RESULT: ${{ needs.sast-patterns.result }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Security Audit Summary

          | Check | Status |
          |-------|--------|
          | **npm audit** | $NPM_RESULT |
          | **Go vulncheck** | $GO_RESULT |
          | **SAST patterns** | $SAST_RESULT |

          **Commit:** \`${GITHUB_SHA::8}\` on \`${GITHUB_REF_NAME}\`
          EOF

          if [ "$NPM_RESULT" = "failure" ] || [ "$SAST_RESULT" = "failure" ]; then
            echo "::error::Security audit found blocking issues"
            exit 1
          fi
