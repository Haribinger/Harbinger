# ─────────────────────────────────────────────────────────────────────────────
#  HARBINGER NIGHTLY MAINTENANCE
#  MAINTAINER agent runs at 02:00 UTC, applies safe auto-fixes
#  (console.log removal), and opens a PR if anything changed.
#
#  Manual: Actions → Nightly Maintenance → Run workflow
#  Docs:   docs/github-actions/README.md
# ─────────────────────────────────────────────────────────────────────────────

name: Nightly Maintenance

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'

permissions:
  contents: write
  pull-requests: write

jobs:
  nightly-maintenance:
    name: Nightly Scan & Fix
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm ${{ env.PNPM_VERSION }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Configure git
        run: |
          git config user.name "MAINTAINER Agent"
          git config user.email "maintainer@harbinger.local"

      - name: Run maintenance scans
        id: scan
        run: |
          chmod +x skills/claude-skills/maintainer/scripts/run-maintenance.sh
          REPORT=$(bash skills/claude-skills/maintainer/scripts/run-maintenance.sh)
          echo "$REPORT" > maintenance-report.json
          echo "report<<EOF" >> $GITHUB_OUTPUT
          echo "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          SCORE=$(echo "$REPORT" | grep -o '"score": [0-9]*' | head -1 | grep -o '[0-9]*$' || echo 0)
          SCORE=${SCORE:-0}
          echo "score=$SCORE" >> $GITHUB_OUTPUT

      - name: Apply safe fixes
        id: fix
        run: |
          DATE=$(date -u +%Y%m%d)
          BRANCH="maintainer/nightly-$DATE"
          FIXED=0

          # FIXED: Use -g patterns instead of --type ts
          FILES=$(rg -l 'console\.log' -g '*.ts' -g '*.tsx' --glob '!node_modules' --glob '!dist' --glob '!*.test.*' --glob '!*.spec.*' 2>/dev/null || true)
          if [ -n "$FILES" ]; then
            for file in $FILES; do
              sed -i '/^\s*console\.log(.*);*\s*$/d' "$file"
              FIXED=$((FIXED + 1))
            done
          fi

          echo "fixed=$FIXED" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

          if [ "$FIXED" -gt 0 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create PR if changes exist
        if: steps.fix.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.fix.outputs.branch }}"
          FIXED="${{ steps.fix.outputs.fixed }}"
          SCORE="${{ steps.scan.outputs.score }}"

          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore(maintainer): nightly maintenance $(date -u +%Y-%m-%d)

          Score: $SCORE/100
          Auto-fixed: $FIXED files (console.log removal)
          Generated by MAINTAINER agent"

          git push origin "$BRANCH"

          gh pr create \
            --title "chore(maintainer): nightly $(date -u +%Y-%m-%d)" \
            --body "## Nightly Maintenance Report

          - **Health Score:** $SCORE/100
          - **Auto-fixed:** $FIXED files
          - **Fix type:** console.log removal

          ### Changes
          - Removed standalone \`console.log()\` from $FIXED TypeScript files
          - Preserved \`console.error\`, \`console.warn\`, \`console.info\`
          - Skipped test files

          ---
          *Generated by MAINTAINER agent at $(date -u)*" \
            --base main \
            --label "maintainer,auto-fix"

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: maintenance-report
          path: maintenance-report.json
          retention-days: 30
