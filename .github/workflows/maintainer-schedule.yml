# ─────────────────────────────────────────────────────────────────────────────
#  HARBINGER NIGHTLY MAINTENANCE
#  MAINTAINER agent runs at 02:00 UTC, applies safe auto-fixes
#  (console.log removal), and opens a PR if anything changed.
#
#  Manual: Actions → Nightly Maintenance → Run workflow
# ─────────────────────────────────────────────────────────────────────────────

name: Nightly Maintenance

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'

permissions:
  contents: write
  pull-requests: write

jobs:
  nightly-maintenance:
    name: Nightly Scan & Fix
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm ${{ env.PNPM_VERSION }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install ripgrep
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ripgrep

      - name: Configure git
        run: |
          git config user.name "MAINTAINER Agent"
          git config user.email "maintainer@harbinger.local"

      - name: Run maintenance scans
        id: scan
        run: |
          chmod +x skills/claude-skills/maintainer/scripts/run-maintenance.sh

          # Run script, capture stdout only (JSON). Stderr has diagnostics.
          REPORT=$(bash skills/claude-skills/maintainer/scripts/run-maintenance.sh 2>/dev/null) || true

          # Validate JSON output
          if ! echo "$REPORT" | head -1 | grep -q '^{'; then
            echo "::warning::Maintenance script output was not valid JSON"
            REPORT='{"date":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'","score":50,"metrics":{"any_types":0,"console_logs":0,"empty_catches":0,"todo_count":0,"hardcoded_urls":0,"deps_outdated":0,"test_coverage":0,"conventions":0,"go_vet_issues":0},"deductions":0,"bonus":0}'
          fi

          echo "$REPORT" > maintenance-report.json

          echo "report<<GHEOF" >> $GITHUB_OUTPUT
          echo "$REPORT" >> $GITHUB_OUTPUT
          echo "GHEOF" >> $GITHUB_OUTPUT

          SCORE=$(echo "$REPORT" | grep -o '"score": *[0-9]*' | head -1 | grep -o '[0-9]*$' || echo 50)
          SCORE=${SCORE:-50}
          echo "score=$SCORE" >> $GITHUB_OUTPUT

      - name: Apply safe fixes
        id: fix
        run: |
          DATE=$(date -u +%Y%m%d)
          BRANCH="maintainer/nightly-$DATE"
          FIXED=0

          # Find and remove standalone console.log
          FILES=$(rg -l 'console\.log' -g '*.ts' -g '*.tsx' \
            --glob '!node_modules' --glob '!dist' --glob '!*.test.*' --glob '!*.spec.*' \
            2>/dev/null || true)

          if [ -n "$FILES" ]; then
            for file in $FILES; do
              sed -i '/^\s*console\.log(.*);*\s*$/d' "$file"
              FIXED=$((FIXED + 1))
            done
          fi

          echo "fixed=$FIXED" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

          if [ "$FIXED" -gt 0 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create PR if changes exist
        if: steps.fix.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.fix.outputs.branch }}"
          FIXED="${{ steps.fix.outputs.fixed }}"
          SCORE="${{ steps.scan.outputs.score }}"

          git checkout -b "$BRANCH"
          git add -A
          git commit -m "$(cat <<'COMMITMSG'
          chore(maintainer): nightly maintenance $(date -u +%Y-%m-%d)

          Score: $SCORE/100
          Auto-fixed: $FIXED files (console.log removal)
          Generated by MAINTAINER agent
          COMMITMSG
          )"

          git push origin "$BRANCH"

          gh pr create \
            --title "chore(maintainer): nightly $(date -u +%Y-%m-%d)" \
            --body "$(cat <<'PRBODY'
          ## Nightly Maintenance Report

          - **Health Score:** SCORE_PLACEHOLDER/100
          - **Auto-fixed:** FIXED_PLACEHOLDER files
          - **Fix type:** console.log removal

          ### Changes
          - Removed standalone `console.log()` from TypeScript files
          - Preserved `console.error`, `console.warn`, `console.info`
          - Skipped test files

          ---
          *Generated by MAINTAINER agent*
          PRBODY
          )" \
            --base main \
            --label "maintainer,auto-fix" || echo "::warning::PR creation failed (may already exist)"

      - name: Write summary
        if: always()
        run: |
          SCORE="${{ steps.scan.outputs.score }}"
          SCORE=${SCORE:-0}
          FIXED="${{ steps.fix.outputs.fixed }}"
          FIXED=${FIXED:-0}
          HAS_CHANGES="${{ steps.fix.outputs.has_changes }}"

          if [ "$HAS_CHANGES" = "true" ]; then
            STATUS="Auto-fix PR created ($FIXED files)"
          else
            STATUS="No auto-fixable issues found"
          fi

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Nightly Maintenance Report

          | Metric | Value |
          |--------|-------|
          | **Health Score** | $SCORE/100 |
          | **Files Fixed** | $FIXED |
          | **Status** | $STATUS |
          | **Date** | $(date -u +%Y-%m-%d) |
          EOF

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: maintenance-report
          path: maintenance-report.json
          retention-days: 30
