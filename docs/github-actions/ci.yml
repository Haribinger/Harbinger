# ─────────────────────────────────────────────────────────────────────────────
#  REFERENCE COPY — source of truth is .github/workflows/ci.yml
#  GitHub only runs workflows from .github/workflows/.
#  This copy exists so docs/github-actions/ is self-contained.
#  Keep it in sync when modifying the real workflow.
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  GO_VERSION: '1.24'
  PNPM_VERSION: '10'

permissions:
  contents: read

jobs:
  # ─── Frontend ───────────────────────────────────────────────────────────────
  build-frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit
        working-directory: harbinger-tools/frontend
      - run: pnpm exec eslint . --max-warnings 0
        working-directory: harbinger-tools/frontend
      - run: pnpm build:ui
      - run: pnpm --filter harbinger-frontend test --run --passWithNoTests
      - uses: actions/upload-artifact@v4
        if: success() && github.ref == 'refs/heads/main'
        with:
          name: frontend-dist
          path: harbinger-tools/frontend/dist
          retention-days: 7

  # ─── Backend ────────────────────────────────────────────────────────────────
  build-backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum
      - run: go build -o /tmp/harbinger-backend ./cmd/
        working-directory: backend
      - run: go vet ./cmd/...
        working-directory: backend
      - run: go test ./cmd/... -count=1 -timeout 120s
        working-directory: backend

  # ─── Summary ────────────────────────────────────────────────────────────────
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    if: always() && !cancelled()
    steps:
      - name: Evaluate results and write summary
        env:
          FE_RESULT: ${{ needs.build-frontend.result }}
          BE_RESULT: ${{ needs.build-backend.result }}
        run: |
          FE_ICON=$( [ "$FE_RESULT" = "success" ] && echo "pass" || echo "FAIL" )
          BE_ICON=$( [ "$BE_RESULT" = "success" ] && echo "pass" || echo "FAIL" )
          ALL_PASS=$( [ "$FE_RESULT" = "success" ] && [ "$BE_RESULT" = "success" ] && echo "true" || echo "false" )

          if [ "$ALL_PASS" = "true" ]; then
            TITLE="CI passed"
          else
            TITLE="CI failed"
          fi

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## $TITLE

          | Job | Status | Steps |
          |-----|--------|-------|
          | **Frontend** | $FE_ICON | install, typecheck, lint, build, test |
          | **Backend** | $BE_ICON | build, vet, test |

          **Commit:** \`${GITHUB_SHA::8}\` on \`${GITHUB_REF_NAME}\`
          **Run:** [#${GITHUB_RUN_NUMBER}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})
          EOF

          if [ "$ALL_PASS" = "false" ]; then
            echo "::error::One or more CI jobs failed."
            exit 1
          fi
