# Harbinger Docker Compose — Production-Hardened
# All secrets MUST be set in .env — no defaults for sensitive values.
# See .env.example for required variables.

services:
  # ==== DOCKER SOCKET PROXY (restricted API access for backend) ====
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: harbinger-docker-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      POST: 1
      VOLUMES: 0
      EXEC: 0
      SWARM: 0
      NODES: 0
      SERVICES: 0
      TASKS: 0
      SECRETS: 0
      CONFIGS: 0
      PLUGINS: 0
      SYSTEM: 0
      AUTH: 0
      BUILD: 0
      DISTRIBUTION: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - harbinger-network
    tmpfs:
      - /run
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  # ==== POSTGRESQL DATABASE ====
  postgres:
    image: pgvector/pgvector:pg17
    container_name: harbinger-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-harbinger}
      POSTGRES_USER: ${DB_USER:-harbinger}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    # No host ports — only reachable on internal network
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - harbinger-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-harbinger} -d ${DB_NAME:-harbinger}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ==== REDIS CACHE ====
  redis:
    image: redis:8.6-alpine
    container_name: harbinger-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    # No host ports — only reachable on internal network
    volumes:
      - redis_data:/data
    networks:
      - harbinger-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
    read_only: true
    tmpfs:
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  # ==== NEO4J KNOWLEDGE GRAPH ====
  neo4j:
    image: neo4j:2026.03-community
    container_name: harbinger-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}
    # No host ports — only reachable on internal network
    volumes:
      - neo4j_data:/data
    networks:
      - harbinger-network
    healthcheck:
      # Use wget against Neo4j's HTTP API — simpler than cypher-shell auth
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ==== GO BACKEND API ====
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - VERSION=${APP_VERSION:-1.1.0}
    container_name: harbinger-backend
    restart: unless-stopped
    extra_hosts:
      # Required on Linux/WSL2 — maps host.docker.internal to the host gateway
      - "host.docker.internal:host-gateway"
    environment:
      - APP_NAME=${APP_NAME:-Harbinger}
      - APP_ENV=${APP_ENV:-production}
      - APP_PORT=${APP_PORT:-8080}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-harbinger}
      - DB_USER=${DB_USER:-harbinger}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - DB_SSLMODE=${DB_SSLMODE:-disable}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - NEO4J_HOST=neo4j
      - NEO4J_PORT=7687
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MCP_ENABLED=${MCP_ENABLED:-true}
      - HEXSTRIKE_URL=http://hexstrike:3001
      - MCP_UI_URL=http://mcp-ui:3003
      - REDTEAM_URL=http://redteam:3004
      - BROWSER_SERVICE_URL=${BROWSER_SERVICE_URL:-}
      - DOCKER_HOST=tcp://docker-proxy:2375
      - DOCKER_NETWORK=${DOCKER_NETWORK:-harbinger_harbinger-network}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - APP_URL=${APP_URL:-http://localhost}
      - GITHUB_REDIRECT_URL=${GITHUB_REDIRECT_URL:-http://localhost/api/auth/github/callback}
      - GH_TOKEN=${GH_TOKEN:-}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - ROAR_SECRET=${ROAR_SECRET:-}
      - SKILLS_DIR=/app/skills
    # No host ports — only reachable through nginx
    volumes:
      - ./config:/app/config:ro
      - ./skills:/app/skills:ro
      - ./agents:/app/agents:ro
      - ./mcp-plugins:/app/mcp-plugins:ro
      - ./logs:/app/logs
    networks:
      - harbinger-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      docker-proxy:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ==== FASTAPI ENGINE (v2 API) ====
  backend-py:
    build:
      context: ./prowlrbot-engine
      dockerfile: Dockerfile
    container_name: harbinger-engine
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-harbinger}
      - DB_USER=${DB_USER:-harbinger}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - DOCKER_HOST=tcp://docker-proxy:2375
      - DOCKER_NETWORK=harbinger_harbinger-network
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - APP_ENV=${APP_ENV:-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - harbinger-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ==== REACT FRONTEND ====
  frontend:
    build:
      context: .
      dockerfile: harbinger-tools/frontend/Dockerfile
      args:
        - VITE_API_URL=
    container_name: harbinger-frontend
    restart: unless-stopped
    # No host ports — only reachable through nginx
    networks:
      - harbinger-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/index.html"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ==== RED TEAM OPERATIONS ====
  redteam:
    build:
      context: ./mcp-plugins/redteam
      dockerfile: Dockerfile
    container_name: harbinger-redteam
    restart: unless-stopped
    environment:
      - REDTEAM_PORT=3004
      - HARBINGER_API_URL=http://backend:8080
      - NEO4J_HOST=neo4j
      - NEO4J_PORT=7687
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}
      - REDIS_URL=redis://${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
    # No host ports — only reachable through nginx
    volumes:
      - report_data:/app/reports
    networks:
      - harbinger-network
    depends_on:
      backend:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  # ==== HEXSTRIKE MCP - 150+ SECURITY TOOLS ====
  hexstrike:
    build:
      context: ./mcp-plugins/hexstrike-ai
      dockerfile: Dockerfile
    container_name: harbinger-hexstrike
    restart: unless-stopped
    environment:
      - HEXSTRIKE_PORT=3001
      - HEXSTRIKE_API_URL=http://hexstrike:3001
      - HARBINGER_API_URL=http://backend:8080
      - NIKTO_PATH=${NIKTO_PATH:-/usr/bin/nikto}
      - NUCLEI_PATH=${NUCLEI_PATH:-/usr/local/bin/nuclei}
      - DIRSEARCH_PATH=${DIRSEARCH_PATH:-/usr/bin/dirsearch}
      - SQLMAP_PATH=${SQLMAP_PATH:-/usr/bin/sqlmap}
    # No host ports — only reachable through nginx
    volumes:
      - report_data:/app/reports
    networks:
      - harbinger-network
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ==== MCP-UI VISUALIZATION SERVER ====
  mcp-ui:
    build:
      context: ./mcp-plugins/mcp-ui
      dockerfile: Dockerfile
    container_name: harbinger-mcp-ui
    restart: unless-stopped
    environment:
      - MCP_UI_PORT=3003
      - HARBINGER_API_URL=http://backend:8080
      - REDIS_URL=redis://${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
    # No host ports — only reachable through nginx
    networks:
      - harbinger-network
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  # ==== NGINX REVERSE PROXY ====
  nginx:
    image: nginx:alpine
    container_name: harbinger-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-8980}:80"
      - "${NGINX_HTTPS_PORT:-8943}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./brand:/usr/share/nginx/html/brand:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - harbinger-network
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
      backend-py:
        condition: service_healthy
    healthcheck:
      # Check nginx is responding (not backend health — that has its own check)
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  report_data:

networks:
  harbinger-network:
    driver: bridge
