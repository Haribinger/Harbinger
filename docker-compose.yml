services:
  # ==== POSTGRESQL DATABASE ====
  postgres:
    image: pgvector/pgvector:pg16
    container_name: harbinger-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-harbinger}
      POSTGRES_USER: ${DB_USER:-harbinger}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - harbinger-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-harbinger} -d ${DB_NAME:-harbinger}",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==== REDIS CACHE ====
  redis:
    image: redis:7-alpine
    container_name: harbinger-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - harbinger-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==== NEO4J KNOWLEDGE GRAPH ====
  neo4j:
    image: neo4j:5.15-community
    container_name: harbinger-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-neo4j-change-me}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - harbinger-network

  # ==== GO BACKEND API ====
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - VERSION=${APP_VERSION:-1.0.0}
    container_name: harbinger-backend
    restart: unless-stopped
    environment:
      - APP_NAME=${APP_NAME:-Harbinger}
      - APP_ENV=${APP_ENV:-development}
      - APP_PORT=${APP_PORT:-8080}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-harbinger}
      - DB_USER=${DB_USER:-harbinger}
      - DB_PASSWORD=${DB_PASSWORD:-change-me}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NEO4J_HOST=neo4j
      - NEO4J_PORT=7687
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-neo4j-change-me}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MCP_ENABLED=${MCP_ENABLED:-true}
      - HEXSTRIKE_URL=${HEXSTRIKE_URL:-http://hexstrike:3001}
      - PENTAGI_URL=${PENTAGI_URL:-http://pentagi:3002}
      - MCP_UI_URL=${MCP_UI_URL:-http://mcp-ui:3003}
      - REDTEAM_URL=${REDTEAM_URL:-http://redteam:3004}
      - BROWSER_SERVICE_URL=${BROWSER_SERVICE_URL:-}
      - DOCKER_SOCKET=${DOCKER_SOCKET:-/var/run/docker.sock}
    ports:
      - "${APP_PORT:-8080}:8080"
      - "${METRICS_PORT:-9090}:9090"
    volumes:
      - ./config:/app/config:ro
      - ./mcp-plugins:/app/mcp-plugins:ro
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - harbinger-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==== REACT FRONTEND ====
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: harbinger-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - harbinger-network
    depends_on:
      backend:
        condition: service_healthy

  # ==== PENTAGI AUTONOMOUS AGENT SYSTEM ====
  pentagi:
    build:
      context: ./mcp-plugins/pentagi
      dockerfile: Dockerfile
    container_name: harbinger-pentagi
    restart: unless-stopped
    environment:
      - PENTAGI_PORT=3002
      - PENTAGI_API_URL=${MCP_PENTAGI_URL:-http://localhost:3002}
      - HARBINGER_API_URL=http://backend:8080
      #     - OPENAI_API_KEY=${OPENAI_API_KEY}
      #     - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    ports:
      - "3002:3002"
    volumes:
      - ./mcp-plugins/pentagi:/app/plugins
    networks:
      - harbinger-network
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ==== RED TEAM OPERATIONS (Mandiant Harbinger-style capabilities) ====
  redteam:
    build:
      context: ./mcp-plugins/redteam
      dockerfile: Dockerfile
    container_name: harbinger-redteam
    restart: unless-stopped
    environment:
      - REDTEAM_PORT=3004
      - HARBINGER_API_URL=http://backend:8080
      - NEO4J_HOST=neo4j
      - NEO4J_PORT=7687
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-neo4j-change-me}
      - REDIS_URL=redis://redis:6379
      #     - MYTHIC_URL=${MYTHIC_URL}
      #     - MYTHIC_API_KEY=${MYTHIC_API_KEY}
      #     - SLIVER_URL=${SLIVER_URL}
    ports:
      - "3004:3004"
    volumes:
      - ./mcp-plugins/redteam:/app/plugins
      - ./data/reports:/app/reports
    networks:
      - harbinger-network
    depends_on:
      backend:
        condition: service_healthy
      neo4j:
        condition: service_started

  # ==== HEXSTRIKE MCP - 150+ SECURITY TOOLS ====
  hexstrike:
    build:
      context: ./mcp-plugins/hexstrike-ai
      dockerfile: Dockerfile
    container_name: harbinger-hexstrike
    restart: unless-stopped
    environment:
      - HEXSTRIKE_PORT=3001
      - HEXSTRIKE_API_URL=${MCP_HEXRIDGE_URL:-http://localhost:3001}
      - HARBINGER_API_URL=http://backend:8080
      - NIKTO_PATH=${NIKTO_PATH:-/usr/bin/nikto}
      - NUCLEI_PATH=${NUCLEI_PATH:-/usr/local/bin/nuclei}
      - DIRSEARCH_PATH=${DIRSEARCH_PATH:-/usr/bin/dirsearch}
      - SQLMAP_PATH=${SQLMAP_PATH:-/usr/bin/sqlmap}
    ports:
      - "3001:3001"
    volumes:
      - ./mcp-plugins/hexstrike:/app/plugins
      - ./data/reports:/app/reports
    networks:
      - harbinger-network
    depends_on:
      backend:
        condition: service_healthy

  # ==== MCP-UI VISUALIZATION SERVER ====
  mcp-ui:
    build:
      context: ./mcp-plugins/mcp-ui
      dockerfile: Dockerfile
    container_name: harbinger-mcp-ui
    restart: unless-stopped
    environment:
      - MCP_UI_PORT=3003
      - HARBINGER_API_URL=http://backend:8080
      - REDIS_URL=redis://redis:6379
    ports:
      - "3003:3003"
    volumes:
      - ./mcp-plugins/visualizers:/app/plugins
    networks:
      - harbinger-network
    depends_on:
      - redis
      - backend

  # ==== NGINX REVERSE PROXY ====
  nginx:
    image: nginx:alpine
    container_name: harbinger-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./brand:/usr/share/nginx/html/brand:ro
    networks:
      - harbinger-network
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
  neo4j_data:

networks:
  harbinger-network:
    driver: bridge
